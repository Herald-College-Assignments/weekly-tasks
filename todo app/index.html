<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">
    <div class="card">
        <h1>To do List:</h1>
        <form action="" class="input-group" id="todoForm">
            <label>
                <input type="text" id="item" placeholder="Task name">
            </label>
            <button type="submit" class="add-button">+</button>
        </form>

        <ul id="taskList">

        </ul>
    </div>
</div>

</body>
<script src="script.js"></script>
</html>
