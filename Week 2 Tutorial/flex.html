<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>

<style>
    .container {
        background-color: cyan;
        padding: 4px;
        width: 100%;
        height: 50vh;
        display: flex;
        flex-direction: column;
        justify-content: start;
        align-items: center;
    }

    .box {
        background-color: antiquewhite;
        height: 20px;
        padding: 5px;
        width: 5%;
        border: 1px solid black;
    }
</style>

<body>
<div class="container">
    <div class="box">
        Hello
    </div>
    <div class="box">
        Fellow
    </div>
    <div class="box">
        Human
    </div>
    <div class="box">
        Being
    </div>
</div>
</body>
</html>
