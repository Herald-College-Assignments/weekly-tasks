<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>

<style>
    .container {
        background-color: cyan;
        padding: 4px;
        width: 100%;
        height: 50vh;
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
    }

    .box {
        background-color: antiquewhite;
        height: auto;
        padding: 5px;
        width: auto;
        border: 1px solid black;
    }

    @media(min-width: 768px) {
        .container {
            grid-template-columns: 1fr 1fr;
        }
    }
    @media(min-width: 1024px) {
        .container {
            grid-template-columns: 1fr 1fr 1fr;
        }
    }

</style>

<body>
<div class="container">
    <div class="box">
        Hello
    </div>
    <div class="box">
        Fellow
    </div>
    <div class="box">
        Human
    </div>
    <div class="box">
        Being
    </div>
</div>
</body>
</html>
